<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Product Browser</title>
  <style>
    body {
      font-family: -apple-system, Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 16px;
      background: #fafafa;
      color: #222;
    }

    h1 { margin-bottom: 4px; }

    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    select, button {
      padding: 8px 12px;
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      text-align: left;
      padding: 8px 10px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    th { background: #f0f0f0; }
    #loadMoreBtn {
      margin-top: 16px;
      width: 100%;
    }

    #status {
      color: #777;
      font-size: 13px;
      margin-top: 8px;
    }
  </style>

</head>

<body>
  <h1>Product Browser</h1>
  <p id="status">Loading...</p>

  <div class="controls">
    <select id="categoryFilter">
      <option value="">All categories</option>
    </select>
    <button id="resetBtn">Reset</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Category</th>
        <th>Price</th>
        <th>Created At</th>
      </tr>
    </thead>
    <tbody id="productRows"></tbody>
  </table>

  <button id="loadMoreBtn">Load more</button>

  <script src="app.js"></script>
</body>
</html>
